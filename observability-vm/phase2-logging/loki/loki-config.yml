# ============================================================
# Loki Configuration
# ============================================================
# Dựa trên config đã chạy ổn định với Loki 3.3.2
# Chế độ: monolithic (tất cả trong 1 process)
# Storage: MinIO (S3-compatible) — bucket "loki"
# ============================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    s3:
      endpoint: minio:9000
      bucketnames: loki
      access_key_id: minioadmin
      secret_access_key: minioadmin
      insecure: true              # HTTP (không HTTPS) cho lab
      s3forcepathstyle: true      # Bắt buộc cho MinIO
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

limits_config:
  retention_period: 168h         # 7 ngày
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # Chấp nhận entries tối đa 7 ngày tuổi
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_streams_per_user: 10000
  max_line_size: 256kb

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: s3

analytics:
  reporting_enabled: false
