# ============================================================
# Phase 2: Logging
# Loki + Alloy
# ============================================================
# Mục tiêu: Thu thập và tập trung logs từ Docker containers
# Join cùng external network "observability" với Phase 1
# ============================================================

services:
  # ==========================================================
  # GRAFANA LOKI - Log Storage & Query Engine
  # ==========================================================
  # Loki lưu trữ logs và cho phép query bằng LogQL.
  # Khác Elasticsearch: Loki chỉ index LABELS, không index nội
  # dung log → rất nhẹ, ít tốn tài nguyên.
  # ==========================================================
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s          # Cho Loki 30s để khởi tạo ring trước khi bắt đầu check

  # ==========================================================
  # GRAFANA ALLOY - Log Collector (thay thế Promtail)
  # ==========================================================
  # Alloy đọc logs từ Docker containers và push về Loki.
  # Nó tự động phát hiện containers qua Docker socket.
  #
  # Alloy = thế hệ mới, thay thế Promtail + Grafana Agent.
  # Có thể thu thập metrics, logs, traces trong 1 agent.
  # ==========================================================
  alloy:
    image: grafana/alloy:v1.13.2
    container_name: alloy
    user: root
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log/host:ro  # Host logs (syslog, auth.log, docker.log)
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"      # Alloy UI
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  loki_data:

# ==========================================================
# External Network - cùng network với Phase 1
# ==========================================================
networks:
  observability:
    external: true
