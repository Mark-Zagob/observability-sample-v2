# ============================================================
# Storage Layer: MinIO (S3-compatible Object Storage)
# ============================================================
# Cung cấp storage tập trung cho Loki (logs) và Tempo (traces)
# Thay thế local filesystem → giống kiến trúc production
#
# MinIO Console: http://<VM_IP>:9001
# S3 API:        http://<VM_IP>:9000
# ============================================================

services:
  # ==========================================================
  # MINIO - S3-compatible Object Storage
  # ==========================================================
  # MinIO cung cấp S3 API hoàn chỉnh trong 1 container.
  # Dùng làm backend cho Loki chunks/index và Tempo blocks.
  # ==========================================================
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"        # S3 API endpoint
      - "9001:9001"        # MinIO Web Console
    volumes:
      - minio_data:/data
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================================
  # MINIO INIT - Tạo buckets tự động khi khởi động
  # ==========================================================
  # Container chạy 1 lần để tạo buckets "loki" và "tempo".
  # Sau khi tạo xong sẽ tự exit (restart: "no").
  # ==========================================================
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/loki --ignore-existing;
      mc mb myminio/tempo --ignore-existing;
      mc anonymous set none myminio/loki;
      mc anonymous set none myminio/tempo;
      echo '=== Buckets created successfully ===';
      mc ls myminio;
      "
    networks:
      - observability
    restart: "no"

volumes:
  minio_data:

networks:
  observability:
    external: true
